# NE PAS COMMITTER avec de vraies valeurs.
# Encoder en base64 : echo -n "valeur" | base64
# En production : utiliser Vault, Sealed Secrets ou External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: omnijira-secret
  namespace: omnijira
type: Opaque
data:
  # postgresql://omnijira:<password>@postgres-service:5432/omnijira?connection_limit=20&pool_timeout=30
  DATABASE_URL: <base64>
  # redis://:<password>@redis-service:6379
  REDIS_URL: <base64>
  NEXTAUTH_SECRET: <base64>
  # Clé 64 hex chars : openssl rand -hex 32
  ENCRYPTION_KEY: <base64>
  OPENAI_API_KEY: <base64>
  KEYCLOAK_CLIENT_SECRET: <base64>
