apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnijira-web
  namespace: omnijira
  labels:
    app: omnijira
    role: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omnijira
      role: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: omnijira
        role: web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: omnijira-web:latest   # <-- remplacer par votre registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: omnijira-config
            - secretRef:
                name: omnijira-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
