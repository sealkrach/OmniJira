apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnijira-web-hpa
  namespace: omnijira
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omnijira-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120   # évite le flapping
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
# HPA worker basé sur CPU — pour scaler sur la profondeur de queue BullMQ,
# il faut un adaptateur KEDA (https://keda.sh) ou un exporter Prometheus custom.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnijira-worker-hpa
  namespace: omnijira
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omnijira-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # attendre 5 min avant de réduire (jobs longs)
